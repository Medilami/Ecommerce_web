<!DOCTYPE html>
<html lang="en">

<head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>MedilamiShop  Your Online Store</title>
          <link rel="stylesheet" href="style.css">
</head>

<body>
          <!-- Header / Navigation -->
          <header>
                    <div class="container">
                              <div class="logo">
                                        <h1> MedilamiShop</h1>
                              </div>
                              <nav>
                                        <a href="index.html" class="active">Home</a>
                                        <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
                              </nav>
                    </div>
          </header>

          <!-- Hero Section -->
          <section class="hero">
                    <div class="container">
                              <h2>Welcome To MedilamiShop</h2>
                              <p>Discover electronics, clothing, and accessories at affordable prices.</p>
                    </div>
          </section>

          <!-- Categories Section -->
          <section class="categories">
                    <div class="container">
                              <h3>Shop by Category</h3>
                              <div class="category-buttons">
                                        <button class="cat-btn active" data-category="all">All Products</button>
                                        <button class="cat-btn" data-category="electronics"> Electronics</button>
                                        <button class="cat-btn" data-category="clothing"> Clothing</button>
                                        <button class="cat-btn" data-category="accessories"> Accessories</button>
                              </div>
                    </div>
          </section>

          <!-- Filter Section -->
          <section class="filters">
                    <div class="container">
                              <h3>Filter by Price</h3>
                              <div class="filter-controls">
                                        <input type="range" id="price-range" min="0" max="5000" value="5000">
                                        <span>Max Price: ₹<span id="price-value">5000</span></span>
                                        <button id="clear-filters" class="clear-btn">Clear Filters</button>
                              </div>
                    </div>
          </section>

          <!-- Products Grid -->
          <section class="products">
                    <div class="container">
                              <h3>Our Products</h3>
                              <div id="products-grid" class="products-grid">
                              
                              </div>
                    </div>
          </section>

          <!-- Footer -->
          <footer>
                    <div class="container">
                              <p>&copy; 2026 MedilamiShop. All rights reserved.</p>
                    </div>
          </footer>

          <script src="script.js"></script>
</body>

</html>
